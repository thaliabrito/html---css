<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeira Tabela Simples</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;

        }
        table{
            border-collapse: collapse;
            width: 400px;
            height: 400px;
            
            

        }
       
        td{
            border: 1px solid black;
            padding: 8px;
            vertical-align: top;
            text-align: center;
         
            
            
        }
       td.c{
        vertical-align: top;
        text-align: left;
        }
        
    </style>
</head>
<body>
    <h1>Primeira Tabela Simples</h1>
    <table>
        <tr >
            <td>A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>
        <tr>
            <td >A2</td>
            <td>B2</td>
            <td class="c">C2</td>
        </tr>
        <tr>
            <td>A3</td>
            <td>B3</td>
            <td class="c">C3</td>
        </tr>

    </table>
    
</body>
</html>
