        body{
            font-family: Arial, Helvetica, sans-serif;

        a{
           
           text-decoration: none;
           font-weight: bold;

        a:visited{
            color: rgb(114, 88, 209);

            text-decoration: underline;
            color: rgb(0, 0, 0);

        .top::after {

        }
