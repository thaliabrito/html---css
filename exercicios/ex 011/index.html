 <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="php.png" type="image/x-icon">
    <title>Midias em HTML </title>
</head>
<body>
<h1>Dinamica com imagem </h1>
<picture>
    <source media="(max-width:750px )" srcset="imagem/p.png" type="image/png">
    <source media="(max-width:1050px )" srcset="imagem/m.png" type="image/png">
    <img src="imagem/g.png" alt="imagem flexível ">
</picture>
<h1>Reproduzido audios</h1>
<audio preload="metadata" autoplay controls loop>
    <source src="midia/nao pare.mp3" type="audio/mpeg">
</audio>
<br>
    <audio preload="metadata"autoplay controls loop>
        <source src="midia/vento.mp3" type="audio/mpeg">
    </audio>

</body>
</html>
